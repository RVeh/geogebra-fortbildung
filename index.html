<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>GeoGebra-Fortbildung</title>

  <script src="https://www.geogebra.org/apps/deployggb.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222222;
    }

    header {
      padding: 10px 12px;
      background: white;
      border-bottom: 1px solid #cccccc;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 1.4rem;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    nav a {
      display: inline-block;
      padding: 7px 12px;

      border: 1px solid #999999;
      border-radius: 6px;

      background: white;
      color: #222222;

      text-decoration: none;
      font-size: 1rem;
    }

    nav a:hover {
      background: #eeeeee;
    }

    nav a[aria-current="page"] {
      border: 2px solid #333333;
      padding: 6px 11px;
      font-weight: 700;
      background: #eeeeee;
    }

    main {
      padding: 10px;
    }

    #dateititel {
      max-width: 1200px;
      margin: 0 auto 8px auto;
      font-size: 1.2rem;
    }

    .ggb-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }
  </style>
</head>

<body>

  <header>
    <h1>Analysis mit GeoGebra</h1>

    <nav
      id="dateiauswahl"
      aria-label="Auswahl der GeoGebra-Datei"
    ></nav>
  </header>

  <main>
    <h2 id="dateititel"></h2>

    <div class="ggb-container">
      <div id="ggb-element"></div>
    </div>
  </main>

  <script>
    /*
      Hier werden die verfügbaren GeoGebra-Dateien eingetragen.

      Der Schlüssel links, zum Beispiel "analysis", wird nur
      für die Internetadresse verwendet.

      "titel" erscheint auf der Schaltfläche.

      "pfad" muss exakt dem Speicherort im Repository entsprechen.
    */

    const dateien = {
      analysis: {
        titel: "Ableitung und Tangente",
        pfad: "ggb/analysis-f-f'.ggb"
      },

       funktionsbestimmung: {
        titel: "Funktionsbestimmung",
        pfad: "ggb/analysis_funktionsbestimmung.ggb"
      },

      lupe: {
        titel: "Funktionslupe",
        pfad: "ggb/analysis_lupe.ggb"
      }
    };


    /*
      Gewählte Datei aus der Internetadresse auslesen,
      zum Beispiel:

      ?datei=analysis
      ?datei=funktionsbestimmung
      ?datei=lupe
    */

    const urlParameter =
      new URLSearchParams(window.location.search);

    const gewuenschteDatei =
      urlParameter.get("datei");

    const ersteDatei =
      Object.keys(dateien)[0];

    const aktiverSchluessel =
      gewuenschteDatei in dateien
        ? gewuenschteDatei
        : ersteDatei;

    const aktiveDatei =
      dateien[aktiverSchluessel];


    /*
      Titel der Seite und Überschrift setzen.
    */

    document.title =
      aktiveDatei.titel + " – GeoGebra-Fortbildung";

    document
      .getElementById("dateititel")
      .textContent = aktiveDatei.titel;


    /*
      Auswahlleiste automatisch erzeugen.
    */

    const navigation =
      document.getElementById("dateiauswahl");

    for (
      const [schluessel, eintrag]
      of Object.entries(dateien)
    ) {
      const link =
        document.createElement("a");

      link.href =
        "?datei=" + encodeURIComponent(schluessel);

      link.textContent =
        eintrag.titel;

      if (schluessel === aktiverSchluessel) {
        link.setAttribute(
          "aria-current",
          "page"
        );
      }

      navigation.appendChild(link);
    }


    /*
      GeoGebra Classic laden.
    */

    const ggbParameter = {
      appName: "classic",

      filename: aktiveDatei.pfad,

      width: 1200,
      height: 800,

      scaleContainerClass: "ggb-container",
      autoHeight: true,
      allowUpscale: true,

      showMenuBar: true,
      showToolBar: true,
      showAlgebraInput: true,
      allowStyleBar: true,

      enableFileFeatures: true,
      enableUndoRedo: true,

      showFullscreenButton: true,

      language: "de"
    };

    const applet =
      new GGBApplet(ggbParameter, true);

    window.addEventListener(
      "load",
      function () {
        applet.inject("ggb-element");
      }
    );
  </script>

</body>
</html>
```
