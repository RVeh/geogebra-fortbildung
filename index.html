<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>GeoGebra-Fortbildung</title>

  <script src="https://www.geogebra.org/apps/deployggb.js"></script>
</head>

<body>

  <h1>Analysis mit GeoGebra</h1>

  <div id="ggb-element"></div>

  <script>
    const parameter = {
      appName: "classic",
      filename: "ggb/Analysis_ff'.ggb",

      width: 1200,
      height: 800,

      showMenuBar: true,
      showToolBar: true,
      showAlgebraInput: true,

      enableFileFeatures: true,
      enableUndoRedo: true,

      language: "de"
    };

    const applet = new GGBApplet(parameter, true);

    window.addEventListener("load", function () {
      applet.inject("ggb-element");
    });
  </script>

</body>
</html>
